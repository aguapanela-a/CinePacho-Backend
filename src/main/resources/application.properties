spring.profiles.active=local
spring.application.name=demo
server.port=${PORT:8010}

#Para la validacion de Enums de entrada y flexibilidad
spring.jackson.datatype.enum.write-enums-to-lowercase=true
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.datatype.enum.read-unknown-enum-values-as-null=true


brevo.api.key=${BREVO_API_KEY}

# URL base para el link de confirmacion
app.base-url=${APP_BASE_URL:http://localhost:8010}

#conexion a BD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

#Datos de admin
admin.name=Administrador
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

#Token de API de pel?culas
tmdb.access.token=${TMDB_TOKEN}
#spring.mail.username=${GMAIL_USER}
#spring.mail.password=${GMAIL_APP_PASSWORD}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.ssl.enable=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# api de brevo para envío de correos
brevo.api.key=${BREVO_API_KEY}

# URL base para el link de confirmación
app.base-url=${APP_BASE_URL:http://localhost:8010}


#conexion a BD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

#Datos de admin
admin.name=Administrador
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

#Token de API de películas
tmdb.access.token=${TMDB_TOKEN}